name: Daily News Update

on:
  # Run every day at 07:00 UTC
  schedule:
    - cron: "0 7 * * *"

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

# Only one run at a time to prevent race conditions on the commit
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    name: Fetch news & update site
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated index.html

    steps:
      # ── 1. Checkout the repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ──────────────────────────────────────────
      # The script uses only the standard library — no pip install needed.
      # If you later add feedparser or other libs, uncomment and add them here:
      # - name: Install dependencies
      #   run: pip install feedparser requests

      # ── 4. Run the news fetcher ──────────────────────────────────────────
      - name: Fetch news and update index.html
        run: python scripts/fetch_news.py

      # ── 5. Commit and push if anything changed ───────────────────────────
      - name: Commit updated files
        run: |
          git config user.name  "BANNED Tracker Bot"
          git config user.email "actions@github.com"

          # Stage index.html and the dedup cache
          git add index.html scripts/seen_guids.json || true

          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to commit — news is unchanged since last run."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: auto-update news [${TIMESTAMP}]"
            git push
            echo "✅ Changes pushed."
          fi
