name: Daily News Update

on:
  schedule:
    - cron: "0 7 * * *"
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deploys; never cancel an in-progress run so commits aren't orphaned
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ── JOB 1: Fetch RSS, update index.html, commit + push ──────────────────────
  fetch-and-commit:
    name: Fetch news & commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt — script uses stdlib only, nothing to install."
          fi

      - name: Fetch news and update index.html
        run: python scripts/fetch_news.py

      - name: Commit updated files
        run: |
          git config user.name  "BANNED Tracker Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html scripts/seen_guids.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit — news is unchanged since last run."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: auto-update news [${TIMESTAMP}]"
            git push
            echo "✅ Changes pushed."
          fi

  # ── JOB 2: Deploy latest main to GitHub Pages ───────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: fetch-and-commit
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Re-checkout so we get any commit that job 1 just pushed
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
